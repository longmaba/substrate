name: Release Substrate CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Build debug binary
        run: cargo build

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: substrate-linux-x64
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: substrate-linux-arm64
          - label: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            asset: substrate-macos-x64
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            asset: substrate-macos-arm64
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: substrate-windows-x64.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release artifact on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: bash scripts/build-substrate-release.sh --target "${{ matrix.target }}"

      - name: Build release artifact on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-substrate-release.ps1 -Target "${{ matrix.target }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --title "$TAG_NAME" --notes "Substrate CLI $TAG_NAME"
          fi
